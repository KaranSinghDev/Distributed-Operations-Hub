name: Distributed Cache CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "Build" ]
  pull_request:
    branches: [ "main", "master", "Build" ]

jobs:
  # Job 1: Quick code quality and build verification
  lint-and-build:
    name: Lint & Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: pip install flake8 && flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Build Main Docker Image
        run: docker build . -f Dockerfile -t distributed-cache:ci

  # Job 2: Run benchmark against the full cluster
  integration-test:
    name: Integration & Benchmark Test
    runs-on: ubuntu-latest
    needs: lint-and-build # This job depends on the first one passing
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start Full System (Docker Compose)
        run: |
          docker compose up -d --build
          echo "Waiting 20 seconds for DB healthcheck and servers to initialize..."
          sleep 20
          docker compose ps # Print status for debugging

      - name: Install Benchmark Dependencies
        run: pip install -r requirements.txt

      - name: Run Benchmark Script
        run: python benchmark.py

  # Job 3: The ultimate proof of resilience
  chaos-test:
    name: Fault Tolerance (Chaos Test)
    runs-on: ubuntu-latest
    needs: integration-test # Run this only after the system proves it works
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start Full System (Docker Compose)
        run: |
          docker compose up -d --build
          echo "Waiting 20 seconds for services to initialize..."
          sleep 20

      - name: Install Test Dependencies
        run: pip install -r requirements.txt
      
      - name: Execute Chaos Test
        run: python chaos_test.py

      - name: Teardown System
        if: always()
        run: docker compose down -v